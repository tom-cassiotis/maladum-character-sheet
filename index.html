<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maladum Character Skill Sheet</title>
  <link rel="stylesheet" href="maladum.css" />
</head>
<body>

<header>
  <h1>Maladum <span>— Character Skill Sheet</span></h1>
  <div class="header-actions">
    <button class="btn btn-secondary" id="btn-clear">Clear</button>
    <button class="btn btn-primary" id="btn-print" onclick="window.print()">&#128438; PDF</button>
  </div>
</header>

<div class="app">

  <!-- ── Selector Panel ────────────────────────────────── -->
  <aside class="selector-panel mobile-active">
    <div class="selector-scroll">
      <div id="skill-list-container"></div>
      <div id="icon-list-container"></div>
    </div>
  </aside>

  <!-- ── Preview Panel ─────────────────────────────────── -->
  <section class="preview-panel">
    <div class="preview-scroll" id="preview-container">
      <div class="empty-state" id="empty-state">
        <div class="icon">&#9876;&#65039;</div>
        <p>No skills or icons selected yet</p>
        <small>Choose skills and icons from the panel on the left to build your character's reference sheet.</small>
      </div>
      <div id="table-container" style="display:none;"></div>
      <div id="icons-reference-container" style="display:none;"></div>
    </div>
  </section>

</div>

<!-- ── Mobile tab bar (hidden on desktop) ──────────────── -->
<nav class="mobile-tab-bar">
  <button class="tab-btn active" data-panel="selector">
    <span class="tab-icon">&#9776;</span>
    <span class="tab-label">Skills <span id="tab-count" class="tab-count-badge"></span></span>
  </button>
  <button class="tab-btn" data-panel="preview">
    <span class="tab-icon">&#128203;</span>
    <span class="tab-label">Reference</span>
  </button>
</nav>

<script src="maladum.js"></script>
</body>
</html>
