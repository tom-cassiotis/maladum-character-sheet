<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maladum Character Skill Sheet</title>
  <style>
    /* ── Base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --surface:   #ffffff;
      --border:    #d1c4b0;
      --accent:    #7c4f1e;
      --accent-lt: #a8693a;
      --accent-dk: #4e2f0e;
      --text:      #2c2016;
      --text-dim:  #7a6654;
      --cat-badge: #e8e0d4;
      --selected:  #fdf3e7;
      --sel-border:#a8693a;
      --print-bg:  #fff;
      --skill-ident-bg: #faf7f3;
      --skill-print-icon-size: 75px;
      --skill-left-icon-size: 60px;
    }

    body {
      font-family: "Georgia", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* prevent icon images showing as white-on-white — give them a subtle tinted bg */
    .skill-icon, .tbl-icon-large { background: var(--skill-ident-bg); }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--accent-dk) 0%, var(--accent) 50%, var(--accent-dk) 100%);
      border-bottom: 3px solid var(--accent-lt);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.8rem;
      color: #fff;
      letter-spacing: 0.06em;
      text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    header h1 span { color: rgba(255,255,255,0.65); font-size: 1rem; font-weight: normal; margin-left: 10px; }

    .header-actions { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    .btn {
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.5);
      border-radius: 4px;
      padding: 8px 18px;
      font-family: inherit;
      font-size: 0.9rem;
      transition: background 0.15s, color 0.15s;
    }

    .btn-primary {
      background: #fff;
      color: var(--accent-dk);
      font-weight: bold;
    }
    .btn-primary:hover { background: #fdf6ee; }

    .btn-secondary {
      background: transparent;
      color: rgba(255,255,255,0.85);
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.15); }

    /* ── Layout ──────────────────────────────────────────────── */
    .app {
      display: flex;
      flex: 1;
      gap: 0;
      overflow: hidden;
      height: calc(100vh - 70px);
    }

    /* ── Skill Selector Panel ────────────────────────────────── */
    .selector-panel {
      width: 320px;
      min-width: 260px;
      background: var(--surface);
      border-right: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    }

    .panel-header {
      padding: 12px 16px;
      background: var(--cat-badge);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .panel-header h2 { font-size: 0.95rem; color: var(--accent); letter-spacing: 0.05em; font-weight: bold; }

    .count-badge {
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      padding: 2px 9px;
      font-size: 0.8rem;
      font-weight: bold;
      min-width: 28px;
      text-align: center;
    }

    .selector-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .selector-scroll::-webkit-scrollbar { width: 6px; }
    .selector-scroll::-webkit-scrollbar-track { background: var(--surface); }
    .selector-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Category group */
    .category-group { margin-bottom: 2px; }

    .category-header {
      padding: 7px 14px;
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent-dk);
      background: var(--cat-badge);
      border-left: 3px solid var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
    }

    .category-header:hover { background: #e0d6c8; }

    .category-header .chevron { transition: transform 0.2s; font-style: normal; }
    .category-group.collapsed .chevron { transform: rotate(-90deg); }
    .category-group.collapsed .skill-list { display: none; }

    .skill-list { padding: 2px 0; }

    /* Skill row */
    .skill-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 18px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .skill-row:hover { background: #f5f0e8; }

    .skill-row.selected {
      background: var(--selected);
      border-left-color: var(--accent);
    }

    .skill-icon {
      width: var(--skill-left-icon-size);
      height: var(--skill-left-icon-size);
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 4px;
      background: transparent;
    }

    .skill-icon-placeholder {
      width: var(--skill-left-icon-size);
      height: var(--skill-left-icon-size);
      flex-shrink: 0;
      border-radius: 4px;
      background: #f0ebe3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--text-dim);
      border: 1px dashed var(--border);
    }

    .skill-name {
      font-size: 0.9rem;
      color: var(--text);
      flex: 1;
    }

    .skill-row.selected .skill-name { color: var(--accent); font-weight: bold; }



    /* ── Preview Panel ───────────────────────────────────────── */
    .preview-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .preview-header {
      padding: 12px 20px;
      background: var(--cat-badge);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preview-header h2 { font-size: 0.95rem; color: var(--accent-dk); letter-spacing: 0.05em; font-weight: bold; }

    /* Per-skill level buttons (in selector panel) */
    .skill-name-wrap { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .skill-level-btns {
      display: flex;
      gap: 4px;
      margin-top: 5px;
      flex-wrap: wrap;
    }

    .skill-lvl-btn {
      cursor: pointer;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 5px 0;
      width: 42px;
      text-align: center;
      font-family: inherit;
      font-size: 0.72rem;
      background: #fff;
      color: var(--text-dim);
      opacity: 0.5;
      transition: background 0.12s, color 0.12s, border-color 0.12s, opacity 0.12s;
    }

    .skill-lvl-btn:hover { border-color: var(--accent-lt); color: var(--accent); opacity: 1; }

    .skill-row.selected .skill-lvl-btn { opacity: 1; }

    .skill-lvl-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: bold;
      opacity: 1;
    }

    .preview-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .preview-scroll::-webkit-scrollbar { width: 6px; }
    .preview-scroll::-webkit-scrollbar-track { background: var(--bg); }
    .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; border: 2px solid var(--bg); }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: var(--text-dim);
      text-align: center;
    }

    .empty-state .icon { font-size: 3rem; opacity: 0.4; }
    .empty-state p { font-size: 1rem; }
    .empty-state small { font-size: 0.85rem; }

    /* Skills table */
    .skills-table-wrap { overflow-x: auto; }

    .skills-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .skills-table thead tr {
      background: var(--accent);
      border-bottom: 2px solid var(--accent-dk);
    }

    .skills-table th {
      padding: 9px 12px;
      text-align: left;
      color: #fff;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .skills-table th:first-child { width: 160px; }
    .skills-table th:nth-child(2) { width: 72px; }

    .category-row td {
      background: var(--cat-badge);
      color: var(--accent-dk);
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 5px 12px;
    }

    /* Bottom border only on the last row of each skill group */
    .skills-table tbody tr.skill-row-last {
      border-bottom: 2px solid var(--border);
    }

    .skills-table tbody tr.skill-row-last:last-child { border-bottom: none; }

    .skills-table td {
      padding: 8px 12px;
      vertical-align: top;
      line-height: 1.5;
    }

    /* The merged skill identity cell (rowspan=3) */
    .skill-identity-cell {
      vertical-align: top !important;
      text-align: center;
      background: var(--skill-ident-bg);
      border-right: 1px solid var(--border);
      padding: 14px 10px !important;
    }

    .skill-name-label {
      display: block;
      font-weight: bold;
      color: var(--accent-dk);
      font-size: 0.92rem;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .tbl-icon-large {
      width: var(--skill-print-icon-size);
      height: var(--skill-print-icon-size);
      object-fit: contain;
      border-radius: 6px;
      display: block;
      margin: 0 auto;
    }

    .tbl-icon-ph {
      width: var(--skill-print-icon-size);
      height: var(--skill-print-icon-size);
      border-radius: 6px;
      background: #f0ebe3;
      border: 1px dashed var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      color: var(--text-dim);
      margin: 0 auto;
    }

    .level-cell {
      vertical-align: middle !important;
      border-right: 1px solid var(--border);
      white-space: nowrap;
    }

    .level-label {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: bold;
      color: var(--accent);
      background: rgba(124,79,30,0.08);
      border: 1px solid rgba(124,79,30,0.25);
      border-radius: 3px;
      padding: 2px 7px;
      white-space: nowrap;
    }

    .level-text { color: var(--text); font-size: 0.83rem; }

    /* ── No-icon notice ──────────────────────────────────────── */
    .notice-bar {
      background: #fef9f0;
      border: 1px solid #e8cfa0;
      border-radius: 5px;
      padding: 10px 16px;
      margin-bottom: 18px;
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .notice-bar strong { color: var(--accent); }

    /* ── Mobile layout ─────────────────────────────────────── */
    .mobile-tab-bar { display: none; }

    @media (max-width: 768px) {
      header {
        padding: 10px 16px;
      }
      header h1 {
        font-size: 1.2rem;
      }
      header h1 span { display: none; }
      .header-actions { gap: 6px; }
      .btn { padding: 7px 12px; font-size: 0.82rem; }

      /* App becomes a single full-height column; panels are layered */
      .app {
        flex-direction: column;
        height: auto;
        flex: 1;
        overflow: hidden;
        position: relative;
      }

      /* Both panels fill the available space but only active one is shown */
      .selector-panel {
        width: 100%;
        min-width: unset;
        border-right: none;
        border-bottom: 1px solid var(--border);
        flex: 1;
        display: none;
        box-shadow: none;
      }
      .selector-panel.mobile-active { display: flex; }

      .preview-panel {
        flex: 1;
        display: none;
      }
      .preview-panel.mobile-active { display: flex; }

      /* Smaller icons in selector on mobile */
      :root { --skill-left-icon-size: 36px; }

      /* Tighter table on mobile */
      .preview-scroll { padding: 10px; }
      .skills-table td { padding: 6px 8px; }
      .tbl-icon-large { width: 54px !important; height: 54px !important; }
      .skill-identity-cell { padding: 10px 8px !important; }

      /* Bottom tab bar */
      .mobile-tab-bar {
        display: flex;
        flex-shrink: 0;
        width: 100%;
        height: 58px;
        background: linear-gradient(135deg, var(--accent-dk) 0%, var(--accent) 100%);
        border-top: 2px solid var(--accent-lt);
      }

      .tab-btn {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 3px;
        border: none;
        background: transparent;
        color: rgba(255,255,255,0.55);
        font-family: inherit;
        font-size: 0.7rem;
        cursor: pointer;
        padding: 6px 4px;
        transition: background 0.15s, color 0.15s;
        -webkit-tap-highlight-color: transparent;
      }
      .tab-btn + .tab-btn {
        border-left: 1px solid rgba(255,255,255,0.15);
      }
      .tab-btn.active {
        color: #fff;
        background: rgba(255,255,255,0.15);
      }
      .tab-icon { font-size: 1.3rem; line-height: 1; }

      .tab-count-badge {
        display: inline-block;
        background: rgba(255,255,255,0.9);
        color: var(--accent-dk);
        border-radius: 99px;
        padding: 0 6px;
        font-size: 0.68rem;
        font-weight: bold;
        min-width: 18px;
        text-align: center;
        margin-left: 3px;
        vertical-align: middle;
      }
      .tab-count-badge:empty, .tab-count-badge[data-zero] { display: none; }
    }

    /* ── Print styles ────────────────────────────────────────── */
    @media print {
      body { background: var(--print-bg); color: #111; }
      header, .selector-panel, .preview-header, .notice-bar, .btn, .mobile-tab-bar { display: none !important; }

      .app { height: auto; display: block; }
      .preview-panel { display: block; }
      .preview-scroll { overflow: visible; padding: 0; }

      .skills-table { font-size: 8pt; }
      .skills-table thead tr { background: #ddd !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .skills-table th { color: #333 !important; }
      .category-row td { background: #eee !important; color: #333 !important; border-left: 3px solid #888 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .skill-row-last { border-bottom: 1px solid #ccc !important; }
      .skill-name-label { color: #333 !important; }
      .skill-identity-cell { border-right: 1px solid #ddd !important; }
      .level-cell { border-right: 1px solid #eee !important; }
      .level-label { color: #555 !important; background: #f0f0f0 !important; border-color: #bbb !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      .level-text { color: #222 !important; }
      .tbl-icon-ph { border-color: #ccc !important; }
      .tbl-icon-large { width: var(--skill-print-icon-size) !important; height: var(--skill-print-icon-size) !important; }
    }
  </style>
</head>
<body>

<header>
  <h1>Maladum <span>— Character Skill Sheet</span></h1>
  <div class="header-actions">
    <button class="btn btn-secondary" id="btn-clear">Clear All</button>
    <button class="btn btn-primary" id="btn-print" onclick="window.print()">&#128438; Print / Save PDF</button>
  </div>
</header>

<div class="app">

  <!-- ── Selector Panel ────────────────────────────────── -->
  <aside class="selector-panel mobile-active">
    <div class="panel-header">
      <h2>Select Skills</h2>
      <span class="count-badge" id="sel-count">0</span>
    </div>
    <div class="selector-scroll" id="skill-list-container"></div>
  </aside>

  <!-- ── Preview Panel ─────────────────────────────────── -->
  <section class="preview-panel">
    <div class="preview-header">
      <h2>Skill Reference Table</h2>
    </div>
    <div class="preview-scroll" id="preview-container">
      <div class="empty-state" id="empty-state">
        <div class="icon">&#9876;&#65039;</div>
        <p>No skills selected yet</p>
        <small>Choose skills from the panel on the left to build your character's reference sheet.</small>
      </div>
      <div id="table-container" style="display:none;"></div>
    </div>
  </section>

</div>

<!-- ── Mobile tab bar (hidden on desktop) ──────────────── -->
<nav class="mobile-tab-bar">
  <button class="tab-btn active" data-panel="selector">
    <span class="tab-icon">&#9776;</span>
    <span class="tab-label">Skills <span id="tab-count" class="tab-count-badge"></span></span>
  </button>
  <button class="tab-btn" data-panel="preview">
    <span class="tab-icon">&#128203;</span>
    <span class="tab-label">Reference</span>
  </button>
</nav>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────

const SKILLS_DATA = [
  {"Category":"Agility","Skill":"Acrobatics","Level 1 Action":"Make a Move action with Scramble X. Passive: You may Stand Up as an effortless action.","Level 2 Action":"Reaction: Use when targeted with an attack. Roll three combat dice. Each hit scored negates one hit from the enemy's attack. If no hits remain, all other effects of the attack are ignored. Passive: You may treat Rough Ground values as one lower.","Level 3 Action":"You burst out of combat. All enemies engaged with your character may be pushed up to two squares away in a direction of your choice... No attacks of opportunity are made, but each enemy pushed back suffers an attack with 2 dice. Then, you may make a Move action."},
  {"Category":"Agility","Skill":"Combat Arts","Level 1 Action":"You sweep your enemy's feet from under them. An enemy in contact is knocked prone. Passive: This character's attacks gain Quickstrike. If using a weapon that also has Quickstrike, you may Dash AND Attack.","Level 2 Action":"Reaction: Use when an enemy engages you, before they attack. Their attack has no effect. Swap positions with the enemy, and then make a Move action with no attacks of opportunity or a Knock Back action with +1 die.","Level 3 Action":"Jump from a higher level, increasing your safe distance by 3. All characters of the same size or smaller adjacent to your landing position are knocked prone. Then make a Melee Attack with additional dice equal to the distance of the Jump."},
  {"Category":"Agility","Skill":"Fleet of Foot","Level 1 Action":"Make a Move action.","Level 2 Action":"Passive: Gain Fast 1.","Level 3 Action":"Make a Move action. This and all your other Move actions in this turn ignore attacks of opportunity. Make an attack with one die against each enemy contacted during your Moves. Any hits will also knock them prone."},
  {"Category":"Agility","Skill":"Reflexes","Level 1 Action":"Reaction: Use when an enemy engages you. Make a Move action, ignoring attacks of opportunity. Passive: Ignore one hit scored against you during any attack of opportunity.","Level 2 Action":"Reaction: Use when an enemy engages you. In any order, make a Move action, ignoring attacks of opportunity, and an Attack action. Passive: This character may use Parry against ranged attacks.","Level 3 Action":"Reaction: Use when an enemy engages you. The attacker is Stunned. In any order, make two Move actions, ignoring attacks of opportunity, and an Attack action. Passive: You may use an effortless action to ignore an attack of opportunity."},

  {"Category":"Cunning","Skill":"Light Fingers","Level 1 Action":"Reaction: Use after suffering a melee attack in which you took no damage. Take any item from the attacker's inventory other than the one they attacked with. If you do not have space for it, drop it or another item you are holding.","Level 2 Action":"Move into contact with another character and make a Pickpocket action. Pickpocket allows rolling to take items, scatter items, or knock targets prone. Then make another Move action with no attacks of opportunity.","Level 3 Action":"Passive: You have access to the Pickpocket action as standard."},

  {"Category":"Endurance","Skill":"Impervious","Level 1 Action":"Reaction: Use whenever you would suffer a status counter of any type. Discard the counter with no effect.","Level 2 Action":"Gain +2 Armour until the end of the round.","Level 3 Action":"Restore 1 Health. This may take you above your starting level. You may discard any status counters. In addition, you ignore all damage, resist all spells without spending pegs, and discard all status counters with no effect until the end of the round."},
  {"Category":"Endurance","Skill":"Onslaught","Level 1 Action":"Reaction: Use after scoring one or more hits on an enemy in melee. Make another Melee Attack action.","Level 2 Action":"Reaction: Use after scoring one or more hits on an enemy with any attack. Move if you wish, and then make another Melee Attack action.","Level 3 Action":"Use during a Move action. You may ignore attacks of opportunity during this Move, and you may make a melee attack against each enemy you engaged with while moving."},

const NO_ICON_SKILLS = [];

// ── State ─────────────────────────────────────────────────────────────────────
const selected = new Set();
const skillLevels = new Map(); // skill name -> levels to show: 1, 2, or 3

// ── Group data by category ────────────────────────────────────────────────────
function groupByCategory(data) {
  const map = new Map();
  for (const skill of data) {
    if (!map.has(skill.Category)) map.set(skill.Category, []);
    map.get(skill.Category).push(skill);
  }
  return map;
}

// ── Icon helper ───────────────────────────────────────────────────────────────
function iconEl(skillName, size = 36) {
  const key = ICON_MAP[skillName];
  if (key) {
    const img = document.createElement("img");
    img.src = `assets/skills/${key}.png`;
    img.alt = skillName;
    img.className = size === 36 ? "skill-icon" : "tbl-icon";
    img.width = size;
    img.height = size;
    return img;
  }
  const ph = document.createElement("div");
  ph.className = size === 36 ? "skill-icon-placeholder" : "tbl-icon-ph";
  ph.title = "No icon available";
  ph.textContent = "?";
  return ph;
}

// ── Build selector ────────────────────────────────────────────────────────────
function buildSelector() {
  const container = document.getElementById("skill-list-container");
  const grouped = groupByCategory(SKILLS_DATA);

  for (const [category, skills] of grouped) {
    const group = document.createElement("div");
    group.className = "category-group";
    group.dataset.category = category;

    const catHeader = document.createElement("div");
    catHeader.className = "category-header";
    catHeader.innerHTML = `<span>${category}</span><em class="chevron">&#9660;</em>`;
    catHeader.addEventListener("click", () => {
      group.classList.toggle("collapsed");
    });

    const skillList = document.createElement("div");
    skillList.className = "skill-list";

    for (const skill of skills) {
      const row = document.createElement("div");
      row.className = "skill-row";
      row.dataset.skill = skill.Skill;

      const icon = iconEl(skill.Skill, 36);

      const nameWrap = document.createElement("div");
      nameWrap.className = "skill-name-wrap";

      const name = document.createElement("span");
      name.className = "skill-name";
      name.textContent = skill.Skill;

      const lvlBtns = document.createElement("div");
      lvlBtns.className = "skill-level-btns";
      const lvlLabels = ["1", "1\u20132", "1\u20133"];
      [1, 2, 3].forEach(n => {
        const btn = document.createElement("button");
        btn.className = "skill-lvl-btn";
        btn.textContent = lvlLabels[n - 1];
        btn.dataset.levels = n;
        btn.addEventListener("click", e => {
          e.stopPropagation();
          if (!selected.has(skill.Skill)) {
            selected.add(skill.Skill);
            row.classList.add("selected");
            updateCount();
          }
          skillLevels.set(skill.Skill, n);
          lvlBtns.querySelectorAll(".skill-lvl-btn").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderTable();
          syncURL();
          // On mobile: switch to the reference tab after making a selection
          if (window.matchMedia("(max-width: 768px)").matches) {
            switchMobileTab("preview");
          }
        });
        lvlBtns.appendChild(btn);
      });

      nameWrap.appendChild(name);
      nameWrap.appendChild(lvlBtns);

      row.appendChild(icon);
      row.appendChild(nameWrap);

      row.addEventListener("click", () => toggleSkill(skill.Skill, row, lvlBtns));
      skillList.appendChild(row);
    }

    group.appendChild(catHeader);
    group.appendChild(skillList);
    container.appendChild(group);
  }
}

// ── Toggle skill selection ────────────────────────────────────────────────────
function toggleSkill(skillName, rowEl, lvlBtns) {
  if (selected.has(skillName)) {
    selected.delete(skillName);
    skillLevels.delete(skillName);
    rowEl.classList.remove("selected");
    lvlBtns.querySelectorAll(".skill-lvl-btn").forEach(b => b.classList.remove("active"));
  } else {
    selected.add(skillName);
    skillLevels.set(skillName, 3);
    rowEl.classList.add("selected");
    // activate the "1-3" button (last one)
    const btns = lvlBtns.querySelectorAll(".skill-lvl-btn");
    btns.forEach(b => b.classList.remove("active"));
    btns[btns.length - 1].classList.add("active");
  }
  updateCount();
  renderTable();
  syncURL();
}

function updateCount() {
  const n = selected.size;
  document.getElementById("sel-count").textContent = n;
  const tabBadge = document.getElementById("tab-count");
  if (tabBadge) {
    tabBadge.textContent = n > 0 ? n : "";
  }
}

// ── Mobile tab switching ──────────────────────────────────────────────────────
function switchMobileTab(panel) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.panel === panel));
  document.querySelector(".selector-panel").classList.toggle("mobile-active", panel === "selector");
  document.querySelector(".preview-panel").classList.toggle("mobile-active", panel === "preview");
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => switchMobileTab(btn.dataset.panel));
});

// ── Render preview table ──────────────────────────────────────────────────────
function renderTable() {
  const empty = document.getElementById("empty-state");
  const tableWrap = document.getElementById("table-container");

  if (selected.size === 0) {
    empty.style.display = "";
    tableWrap.style.display = "none";
    return;
  }

  empty.style.display = "none";
  tableWrap.style.display = "";

  // Filter and preserve category order
  const grouped = groupByCategory(SKILLS_DATA);
  const rows = [];

  // Notice for skills without icons (only show selected ones)
  const missingIcons = NO_ICON_SKILLS.filter(s => selected.has(s));

  let html = "";

  if (missingIcons.length > 0) {
    html += `<div class="notice-bar">
      <strong>&#9888; No icon available</strong> for: ${missingIcons.join(", ")}. 
      These skills are displayed with a placeholder. You may add matching icon files to <code>assets/skills/</code> to resolve this.
    </div>`;
  }

  html += `<div class="skills-table-wrap"><table class="skills-table"><tbody>`;

  for (const [category, skills] of grouped) {
    const catSkills = skills.filter(s => selected.has(s.Skill));
    if (catSkills.length === 0) continue;

    html += `<tr class="category-row"><td colspan="3">${category}</td></tr>`;

    for (const skill of catSkills) {
      const iconKey = ICON_MAP[skill.Skill];
      const iconHtml = iconKey
        ? `<img src="assets/skills/${iconKey}.png" alt="${skill.Skill}" class="tbl-icon-large">`
        : `<div class="tbl-icon-ph" title="No icon">?</div>`;

      const numLevels = skillLevels.get(skill.Skill) || 3;
      const levels = [
        { label: "Level 1", text: skill["Level 1 Action"] },
        { label: "Level 2", text: skill["Level 2 Action"] },
        { label: "Level 3", text: skill["Level 3 Action"] },
      ].slice(0, numLevels);

      levels.forEach((lvl, i) => {
        const isFirst = i === 0;
        const isLast  = i === numLevels - 1;
        const rowClass = isLast ? "skill-data-row skill-row-last" : "skill-data-row";
        const identityCell = isFirst
          ? `<td class="skill-identity-cell" rowspan="${numLevels}">
               <span class="skill-name-label">${skill.Skill}</span>
               ${iconHtml}
             </td>`
          : "";
        html += `<tr class="${rowClass}">
          ${identityCell}
          <td class="level-cell"><span class="level-label">${lvl.label}</span></td>
          <td class="level-text">${lvl.text}</td>
        </tr>`;
      });
    }
  }

  html += `</tbody></table></div>`;
  tableWrap.innerHTML = html;
}

// ── Clear all ─────────────────────────────────────────────────────────────────
document.getElementById("btn-clear").addEventListener("click", () => {
  selected.clear();
  skillLevels.clear();
  document.querySelectorAll(".skill-row.selected").forEach(r => r.classList.remove("selected"));
  document.querySelectorAll(".skill-lvl-btn.active").forEach(b => b.classList.remove("active"));
  updateCount();
  renderTable();
  syncURL();
});

// ── URL state sync ───────────────────────────────────────────────────────────
function syncURL() {
  if (skillLevels.size === 0) {
    history.replaceState(null, "", window.location.pathname + window.location.search);
    return;
  }
  const parts = [];
  for (const [skillName, level] of skillLevels) {
    const idx = SKILLS_DATA.findIndex(s => s.Skill === skillName);
    if (idx !== -1) parts.push(`${idx}:${level}`);
  }
  history.replaceState(null, "", "#s=" + parts.join(","));
}

function restoreFromURL() {
  const hash = window.location.hash;
  if (!hash.startsWith("#s=")) return;
  const parts = hash.slice(3).split(",");
  for (const part of parts) {
    const [idxStr, levelStr] = part.split(":");
    const idx = parseInt(idxStr, 10);
    const level = parseInt(levelStr, 10);
    if (isNaN(idx) || isNaN(level) || idx < 0 || idx >= SKILLS_DATA.length || level < 1 || level > 3) continue;
    const skillName = SKILLS_DATA[idx].Skill;
    const row = document.querySelector(`.skill-row[data-skill="${CSS.escape(skillName)}"]`);
    if (!row) continue;
    selected.add(skillName);
    skillLevels.set(skillName, level);
    row.classList.add("selected");
    const btns = row.querySelectorAll(".skill-lvl-btn");
    btns.forEach(b => b.classList.remove("active"));
    const targetBtn = [...btns].find(b => parseInt(b.dataset.levels, 10) === level);
    if (targetBtn) targetBtn.classList.add("active");
  }
  if (selected.size > 0) { updateCount(); renderTable(); }
}

// ── Init ──────────────────────────────────────────────────────────────────────
buildSelector();
restoreFromURL();
</script>
</body>
</html>
